services:
  - type: web
    name: loyalty-rewards-app
    runtime: docker
    region: singapore  # Closest to India
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false  # Set manually in Render dashboard
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_APP_URL
        sync: false  # Set to your Render URL after first deploy
      - key: SCOPES
        value: read_customers,write_customers,read_orders,write_discounts,read_discounts,read_products
      - key: PORT
        value: 3000
      - key: HF_API_TOKEN
        sync: false  # Set manually in Render dashboard — get free token at huggingface.co/settings/tokens
